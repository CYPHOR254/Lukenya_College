  <div id="lightbox"
       class="fixed inset-0 bg-black/80 z-50 items-center justify-center p-4 backdrop-blur-sm"
       onclick="closeLightbox(event)">
    <div class="relative max-w-3xl w-full" onclick="event.stopPropagation()">
      <button onclick="closeLightbox()"
              class="absolute -top-10 right-0 text-white/70 hover:text-white text-2xl font-light">✕</button>
      <img id="lightbox-img" src="" alt=""
           class="rounded-2xl w-full max-h-[80vh] object-contain shadow-2xl"/>
      <p id="lightbox-caption" class="text-white/60 text-sm text-center mt-3"></p>

      <!-- Prev / Next -->
      <button onclick="prevImage()"
              class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-12 text-white/60 hover:text-white text-3xl">‹</button>
      <button onclick="nextImage()"
              class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-12 text-white/60 hover:text-white text-3xl">›</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════ -->
  <script>
    let currentIndex = 0;
    let visibleImages = [];

    function getAllVisible() {
      return Array.from(document.querySelectorAll('.gallery-img'))
        .filter(img => img.style.display !== 'none');
    }

    function openLightbox(src, alt) {
      visibleImages = getAllVisible();
      currentIndex = visibleImages.findIndex(img => img.src === src);
      showLightboxImage(currentIndex);
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function showLightboxImage(index) {
      const img = visibleImages[index];
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox-caption').textContent = img.alt;
    }

    function closeLightbox(e) {
      if (!e || e.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + visibleImages.length) % visibleImages.length;
      showLightboxImage(currentIndex);
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % visibleImages.length;
      showLightboxImage(currentIndex);
    }

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('lightbox').classList.contains('active')) {
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'Escape') closeLightbox();
      }
    });

    function filterGallery(category) {
      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === category) btn.classList.add('active');
      });

      // Show/hide images
      document.querySelectorAll('.gallery-img').forEach(img => {
        if (category === 'all' || img.dataset.category === category) {
          img.style.display = '';
          img.style.opacity = '0';
          img.style.transform = 'scale(0.95)';
          setTimeout(() => {
            img.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            img.style.opacity = '1';
            img.style.transform = 'scale(1)';
          }, 50);
        } else {
          img.style.display = 'none';
        }
      });
    }
  </script>
