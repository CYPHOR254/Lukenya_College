<div class="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center px-4 pt-24"
     (click)="close()">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[85vh] overflow-y-auto relative"
       (click)="$event.stopPropagation()">

    <!-- Close button -->
    <button (click)="close()"
            class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center
                   rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 text-lg transition">
      ✕
    </button>

    <!-- Success state -->
    <div *ngIf="submitted" class="flex flex-col items-center justify-center py-16 px-8 text-center">
      <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-[#01884E]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Application Submitted!</h2>
      <p class="text-gray-500 text-sm mb-6">We'll be in touch with you shortly.</p>
      <button (click)="close()"
              class="px-8 py-2.5 bg-[#01884E] text-white rounded-full text-sm font-semibold hover:bg-[#016a3d] transition">
        Close
      </button>
    </div>

    <!-- Form -->
    <div *ngIf="!submitted" class="flex flex-col items-center py-10 px-6">

      <div class="mb-4">
        <span class="border border-[#2e7d32] text-[#2e7d32] text-xs font-medium px-4 py-1.5 rounded-full bg-white">
          Apply for this course
        </span>
      </div>
      <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 text-center mb-1">Submit your application here!</h1>
      <p class="text-gray-500 text-sm text-center mb-6">Kindly provide the following details to submit your application</p>

      <div class="bg-white rounded-2xl border border-gray-100 w-full p-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-gray-700">Full Name</label>
            <input [(ngModel)]="form.fullName" type="text" placeholder="Enter your name"
              class="border border-gray-200 rounded-full px-4 py-2.5 text-sm text-gray-700
                     placeholder-gray-400 outline-none focus:ring-2 focus:ring-[#2e7d32]/30 focus:border-[#2e7d32] transition-all"/>
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-gray-700">Email</label>
            <input [(ngModel)]="form.email" type="email" placeholder="Enter your email"
              class="border border-gray-200 rounded-full px-4 py-2.5 text-sm text-gray-700
                     placeholder-gray-400 outline-none focus:ring-2 focus:ring-[#2e7d32]/30 focus:border-[#2e7d32] transition-all"/>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-gray-700">Phone Number</label>
            <input [(ngModel)]="form.phone" type="tel" placeholder="Enter your phone number"
              class="border border-gray-200 rounded-full px-4 py-2.5 text-sm text-gray-700
                     placeholder-gray-400 outline-none focus:ring-2 focus:ring-[#2e7d32]/30 focus:border-[#2e7d32] transition-all"/>
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-gray-700">Program Interest</label>
            <div class="relative">
              <select [(ngModel)]="form.program"
                class="w-full appearance-none border border-gray-200 rounded-full px-4 py-2.5 text-sm text-gray-800
                       focus:outline-none focus:ring-2 focus:ring-[#4a7c2f]/40 focus:border-[#4a7c2f] transition-all bg-white cursor-pointer">
                <option value="" disabled selected>Select a program</option>
                <option *ngFor="let p of programs" [value]="p">{{ p }}</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
                <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-1.5 mb-5">
          <label class="text-sm font-semibold text-gray-700">Mode of study</label>
          <div class="relative">
            <!-- ↓ [(ngModel)] now bound to form.mode -->
            <select [(ngModel)]="form.mode"
              class="w-full appearance-none border border-gray-200 rounded-full px-4 py-2.5
                     text-sm text-gray-800 bg-white outline-none focus:ring-2 focus:ring-[#2e7d32]/30 focus:border-[#2e7d32] transition-all">
              <option value="" disabled selected>Select a mode of study</option>
              <option>Full-time</option>
              <option>Part-time</option>
              <option>Online</option>
            </select>
            <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </div>

        <div class="flex flex-col gap-1.5 mb-7">
          <label class="text-sm font-semibold text-gray-700">Message</label>
          <textarea [(ngModel)]="form.message" rows="4" placeholder="Tell us about yourself and your goals..."
            class="border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-700
                   placeholder-gray-400 outline-none focus:ring-2 focus:ring-[#2e7d32]/30 focus:border-[#2e7d32] transition-all resize-none"></textarea>
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage"
             class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm text-center">
          {{ errorMessage }}
        </div>

        <button (click)="onSubmit()"
          [disabled]="loading"
          class="w-full py-4 bg-[#01884E] text-white font-bold rounded-full text-sm
                 hover:bg-[#3a6020] active:scale-[0.98] transition-all shadow-md hover:shadow-lg
                 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">

          <!-- Spinner shown while loading -->
          <svg *ngIf="loading" class="animate-spin w-4 h-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>

          {{ loading ? 'Submitting...' : 'Apply for Program' }}
        </button>

      </div>
    </div>

  </div>
</div>
