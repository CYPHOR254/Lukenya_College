<!-- ── Sticky Header Wrapper ── -->
<div class="fixed top-0 left-0 right-0 z-50">

    <!-- ── Top Bar ── -->
    <div class="bg-[#2C5D2C] text-white text-sm">
        <div class="max-w-7xl mx-auto px-4 py-2 flex flex-col sm:flex-row items-center justify-between gap-2">

            <!-- Contact Info -->
            <div class="flex items-center gap-6">
                <a href="tel:0722370485"
                    class="flex items-center gap-2 hover:text-green-200 transition-colors duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                    <span>0722 370 485</span>
                </a>
                <a href="mailto:support@lukenyacollege.ac.ke"
                    class="flex items-center gap-2 hover:text-green-200 transition-colors duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span>support&#64;lukenyacollege.ac.ke</span>
                </a>
            </div>

            <!-- Utility Links -->
            <div class="flex items-center gap-4">
                <a href="#" class="hover:text-green-200 transition-colors duration-200">Media Center</a>
                <span class="text-green-300">|</span>
                <a href="/faqs" class="hover:text-green-200 transition-colors duration-200">FAQs</a>
                <span class="text-green-300">|</span>
                <a href="/updates" class="hover:text-green-200 transition-colors duration-200">News &amp; Updates</a>
                <span class="text-green-300">|</span>
                <a href="/gallery" class="hover:text-green-200 transition-colors duration-200">Gallery</a>
            </div>

        </div>
    </div>

    <!-- ── Main Navigation ── -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-24">

                <!-- Logo -->
                <a routerLink="/">
                    <img src="/Lukenya Logo 1.jpg" class="h-20 w-auto object-contain" alt="Lukenya College Logo" />
                </a>

                <!-- Desktop Nav Links -->
                <div class="hidden md:flex items-center gap-1">

                    <ng-container *ngFor="let link of navLinks">

                        <!-- Desktop External link -->
                        <a *ngIf="!link.dropdown && link.external"
                            [href]="link.path"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="px-4 py-2 text-gray-700 font-medium text-sm hover:text-[#4a7c2f]
                                   transition-colors duration-200 border-b-2 border-transparent hover:border-[#4a7c2f]">
                            {{ link.label }}
                        </a>

                        <!-- Desktop Internal link -->
                        <a *ngIf="!link.dropdown && !link.external"
                            [routerLink]="link.path"
                            routerLinkActive="text-[#4a7c2f] font-semibold border-b-2 border-[#4a7c2f]"
                            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
                            class="px-4 py-2 text-gray-700 font-medium text-sm hover:text-[#4a7c2f]
                                   transition-colors duration-200 border-b-2 border-transparent hover:border-[#4a7c2f]">
                            {{ link.label }}
                        </a>

                        <!-- Academics dropdown -->
                        <div *ngIf="link.dropdown" class="relative academics-dropdown-wrapper">
                            <button (click)="toggleDropdown()"
                                class="flex items-center gap-1 px-4 py-2 text-gray-700 font-medium text-sm
                                       hover:text-[#4a7c2f] transition-colors duration-200
                                       border-b-2 border-transparent hover:border-[#4a7c2f]"
                                [class.text-\[#4a7c2f\]]="dropdownOpen"
                                [class.border-\[#4a7c2f\]]="dropdownOpen">
                                {{ link.label }}
                                <svg class="w-4 h-4 transition-transform duration-200"
                                    [class.rotate-180]="dropdownOpen"
                                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>

                            <!-- Dropdown Panel -->
                            <div *ngIf="dropdownOpen"
                                class="absolute top-full left-0 mt-1 w-56 bg-white rounded-xl shadow-lg
                                       border border-gray-100 py-2 z-50 animate-fadeIn">
                                <a *ngFor="let item of link.dropdown"
                                    [routerLink]="item.path"
                                    (click)="closeDropdown()"
                                    routerLinkActive="text-[#4a7c2f] bg-green-50 font-semibold"
                                    class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700
                                           hover:text-[#4a7c2f] hover:bg-green-50 transition-colors duration-150">
                                    <span class="w-1.5 h-1.5 rounded-full bg-[#4a7c2f] opacity-60 flex-shrink-0"></span>
                                    {{ item.label }}
                                </a>
                            </div>
                        </div>

                    </ng-container>

                    <!-- Desktop Apply Now -->
                    <button (click)="isModalOpen = true"
                        class="ml-4 px-6 py-2.5 bg-[#2C5D2C] text-white text-sm font-semibold rounded-full
                               hover:bg-[#3a6020] active:scale-95 transition-all duration-200 shadow-sm hover:shadow-md">
                        Apply Now
                    </button>
                </div>

                <!-- Mobile Hamburger -->
                <button (click)="toggleMenu()"
                    class="md:hidden p-2 rounded-md text-gray-600 hover:text-[#4a7c2f] hover:bg-green-50
                           transition-colors duration-200 focus:outline-none"
                    type="button" aria-label="Toggle menu">
                    <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

            </div>

            <!-- ── Mobile Menu ── -->
            <div *ngIf="isMenuOpen" class="md:hidden border-t border-gray-100 py-3 space-y-1">

                <ng-container *ngFor="let link of navLinks">

                    <!-- Mobile External link -->
                    <a *ngIf="!link.dropdown && link.external"
                        [href]="link.path"
                        target="_blank"
                        rel="noopener noreferrer"
                        (click)="isMenuOpen = false"
                        class="block px-4 py-2.5 text-gray-700 font-medium text-sm rounded-md
                               hover:text-[#4a7c2f] hover:bg-green-50 transition-colors duration-200">
                        {{ link.label }}
                    </a>

                    <!-- Mobile Internal link -->
                    <a *ngIf="!link.dropdown && !link.external"
                        [routerLink]="link.path"
                        routerLinkActive="text-[#4a7c2f] font-semibold bg-green-50"
                        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
                        (click)="isMenuOpen = false"
                        class="block px-4 py-2.5 text-gray-700 font-medium text-sm rounded-md
                               hover:text-[#4a7c2f] hover:bg-green-50 transition-colors duration-200">
                        {{ link.label }}
                    </a>

                    <!-- Mobile Academics accordion -->
                    <div *ngIf="link.dropdown">
                        <button (click)="toggleMobileAcademics()"
                            class="w-full flex items-center justify-between px-4 py-2.5 text-gray-700
                                   font-medium text-sm rounded-md hover:text-[#4a7c2f] hover:bg-green-50
                                   transition-colors duration-200">
                            {{ link.label }}
                            <svg class="w-4 h-4 transition-transform duration-200"
                                [class.rotate-180]="mobileAcademicsOpen"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>

                        <!-- Accordion content -->
                        <div *ngIf="mobileAcademicsOpen" class="pl-6 pb-1 space-y-0.5">
                            <a *ngFor="let item of link.dropdown"
                                [routerLink]="item.path"
                                (click)="isMenuOpen = false; mobileAcademicsOpen = false"
                                routerLinkActive="text-[#4a7c2f] font-semibold"
                                class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 rounded-md
                                       hover:text-[#4a7c2f] hover:bg-green-50 transition-colors duration-150">
                                <span class="w-1.5 h-1.5 rounded-full bg-[#4a7c2f] opacity-60 flex-shrink-0"></span>
                                {{ item.label }}
                            </a>
                        </div>
                    </div>

                </ng-container>

                <!-- Mobile Apply Now -->
                <div class="px-4 pt-2 pb-1">
                    <button (click)="isMenuOpen = false; isModalOpen = true"
                        class="block w-full text-center px-6 py-2.5 bg-[#4a7c2f] text-white text-sm
                               font-semibold rounded-full hover:bg-[#3a6020] transition-colors duration-200">
                        Apply Now
                    </button>
                </div>

            </div>

        </div>
    </nav>

</div>

<!-- Modal -->
<app-modal *ngIf="isModalOpen" (closeModal)="isModalOpen = false"></app-modal>
